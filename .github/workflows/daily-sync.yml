name: Daily Content Sync

on:
  schedule:
    # UTC 19:00 = 北京时间 03:00
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync content from main site (metadata only)
        run: node scripts/sync-content.mjs
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          CONTENT_SOURCE_API_URL: ${{ secrets.CONTENT_SOURCE_API_URL }}
          SKIP_AI_GUIDE_GENERATION: "true"
          CONTENT_SYNC_PAGE_SIZE: "50"
          CONTENT_SYNC_MAX_PAGES: "2"

      - name: Generate AI guides for top articles
        run: node scripts/generate-ai-guides.mjs
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BATCH_SIZE: "15"
          AI_DELAY_MS: "1000"

      - name: Trigger Vercel redeploy
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"deploymentId\": \"${{ secrets.VERCEL_DEPLOYMENT_ID }}\",
              \"name\": \"galgame-guide\",
              \"target\": \"production\"
            }"
